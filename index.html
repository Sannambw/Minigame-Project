<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klickspel</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="game">
  <h1>Klickspel</h1>
  <p class="info">Klicka så många gånger du kan innan tiden tar slut!</p>

  <div class="boxes">
    <div class="box">
      <p>Poäng</p>
      <span id="score">0</span>
    </div>

    <div class="box">
      <p>Tid kvar</p>
      <span id="timer">60</span>
    </div>
  </div>

  <button id="clickButton">Klicka här!</button>

</div>

<div id="gameOverBox">
  <div class="popup">

    <p id="message"></p>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
